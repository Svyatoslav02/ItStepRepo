name: .NET CI

on:
  pull_request:
    branches: 
      - main
      - develop
  push:
    branches:
      - main
      - develop
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/MoodboardAI.sln

      - name: Build solution
        run: dotnet build backend/MoodboardAI.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test backend/MoodboardAI.sln --configuration Release --no-build