services:
  postgres:
    image: postgres:16
    container_name: moodboard-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: itstepITstep#
      POSTGRES_DB: moodboard_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
